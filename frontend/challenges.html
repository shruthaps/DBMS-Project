<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Detox - Challenges</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }
        .back-link:hover { color: var(--accent-purple); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 Challenges</h1>
            <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
        </div>
        
        <div class="section">
            <h2 style="margin-bottom: 25px;">Available Challenges</h2>
            <div id="challengesList" class="limits-grid">
                <!-- Challenges will be loaded here -->
            </div>
        </div>

        <div class="section" style="margin-top: 40px;">
            <h2 style="margin-bottom: 25px;">Group Challenges</h2>
            <div id="groupChallengesList" class="limits-grid">
                <p style="color: var(--text-secondary); grid-column: 1/-1;">Coming soon: Form groups and detox together!</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
