<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Detox - Welcome</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container auth-container">
        <div class="auth-card">
            <h1>📱 Digital Detox</h1>
            <p style="color: var(--text-secondary); margin-bottom: 30px;">Master your screen time, earn rewards.</p>
            
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="showTab('login')">Login</button>
                <button class="tab-btn" onclick="showTab('signup')">Sign Up</button>
            </div>
            
            <!-- Login Form -->
            <form id="loginForm" class="auth-form">
                <input type="email" id="loginEmail" placeholder="Email Address" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit" class="btn">Login to Dashboard</button>
            </form>
            
            <!-- Signup Form -->
            <form id="signupForm" class="auth-form" style="display:none">
                <input type="text" id="signupName" placeholder="Your Name" required>
                <input type="email" id="signupEmail" placeholder="Email Address" required>
                <input type="password" id="signupPassword" placeholder="Create Password" required>
                <button type="submit" class="btn">Start My Journey</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
