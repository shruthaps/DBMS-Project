<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Detox - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 Digital Detox</h1>
            <span id="userName"></span>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
        
        <!-- User Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>🏆 Level</h3>
                <p id="levelName">Bronze</p>
            </div>
            <div class="stat-card">
                <h3>⭐ Points</h3>
                <p id="totalPoints">0</p>
            </div>
            <div class="stat-card">
                <h3>🔥 Streak</h3>
                <p id="currentStreak">0 days</p>
            </div>
            <div class="stat-card">
                <h3>🛡️ Shields</h3>
                <p id="shields">0</p>
            </div>
        </div>
        
        <!-- App Limits Section -->
        <div class="section">
            <h2>📊 Today's Screen Time</h2>
            <div id="appLimits"></div>
            <button id="addLimitBtn" class="btn-secondary">+ Add App Limit</button>
        </div>
        
        <!-- Active Challenges -->
        <div class="section">
            <h2>🏆 Your Active Challenges</h2>
            <div id="activeChallenges"></div>
        </div>
        
        <!-- Available Coupons -->
        <div class="section">
            <h2>🎁 Available Coupons</h2>
            <div id="availableCoupons"></div>
        </div>
        
        <div class="actions">
            <a href="challenges.html" class="btn">Browse All Challenges</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
